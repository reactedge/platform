<head>
  <meta charset="UTF-8" />
</head>

<body>

<script type="module">
  import { mount } from './src/widget.ts';
  import {loadContract} from "./src/lib/contract-resolver.js";
  import {loadRuntime} from "./src/lib/load-runtime.js";

  const config = await loadContract('uk.json')
  const element = document.querySelector('googlereviews-widget');
  const runtime = await loadRuntime();

  await requestAnimationFrame(() => {
    mount(element, config, runtime);
  })
</script>

<googlereviews-widget />

</body>
