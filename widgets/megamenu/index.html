<!DOCTYPE html>
<html>
<link rel="stylesheet" href="https://widgets-cdn.co.uk/megamenu/styles/megamenu.css">
<body>

<script type="module">
    import { mount } from './src/widget.ts';
    import {loadContract} from "./src/lib/contract-resolver.js";
    const config = await loadContract('default.json')
    const element = document.querySelector('megamenu-widget');

    await requestAnimationFrame(() => {
        mount(element, config);
    })
</script>

<megamenu-widget></megamenu-widget>

</body>
</html>
