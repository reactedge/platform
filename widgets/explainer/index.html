<!DOCTYPE html>
<html>
<body>

<h2>explainer x2 Test</h2>

<div class="explainer" id="banner-explainer">
    <button data-explainer-trigger="banner-isolation">Banner trigger</button>
    <div id="outside">Outside</div>
</div>

<script type="module">
    import { mount } from './src/widget.ts';
    import {loadContractByName} from "./src/widget-runtime/lib/contractLoader.js";
    const config = await loadContractByName('/cdn/herobanner-explainer.json')
    const element = document.querySelector('explainer-widget');

    await requestAnimationFrame(() => {
        mount(element, config);
    })
</script>

<explainer-widget config-key="banner-explainer"></explainer-widget>

</body>
</html>
