<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <rect width="100%" height="100%" fill="#ffffff"/>

    <!-- LEFT: Review Card -->
    <rect x="200" y="80" rx="12" ry="12" width="210" height="140" fill="#ffffff" stroke="#e5e5e5"/>

    <!-- Stars -->
    <text x="220" y="120" font-size="20" fill="#f5a623">★★★★☆</text>

    <!-- Review text -->
    <text x="220" y="150" font-size="14" fill="#333">
        Great service, very professional
    </text>

    <!-- Author -->
    <text x="220" y="180" font-size="12" fill="#777">
        — John D
    </text>

    <!-- Label -->
    <text x="220" y="60" font-size="18" fill="#000" font-weight="600">
        Google Reviews
    </text>

    <!-- MIDDLE: Thin connection -->
    <line x1="410" y1="150" x2="580" y2="150" stroke="#999" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- Small annotation -->
    <text x="420" y="135" font-size="11" fill="#999">
        Injected at runtime
    </text>

    <!-- RIGHT: Core System -->
    <rect x="520" y="90" rx="6" ry="6" width="180" height="120" fill="#f3f3f3" stroke="#d0d0d0"/>

    <text x="580" y="140" font-size="14" fill="#666">
        Magento / CMS
    </text>

    <text x="580" y="165" font-size="12" fill="#999">
        Existing system
    </text>

    <!-- Caption -->
    <text x="430" y="260" text-anchor="middle" font-size="14" fill="#333">
        One capability. Zero impact on the core.
    </text>

</svg>