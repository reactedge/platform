min_version = "2025.7.0"

[tools]
node = "22"
python = "3.13"

[tasks."platform-install"]
description = "Install the widgets vite environments & the orchestrator"
run = "./launcher/scripts/platform-install.sh"

[tasks."serve"]
description = "Expose the ReactEdge workspace over HTTP"
run = "./launcher/scripts/widgets-serve.sh"

[tasks.configure]
description = "Configure ReactEdge integrations"
run = "./launcher/scripts/widgets-configure.sh"

[tasks."widget-dev"]
description = "Start a widget development server"
run = "./launcher/scripts/widget-dev.sh {{arg(name='widget', required=true)}}"

[tasks."widget-test"]
description = "Test a widget locally"
run = "./launcher/scripts/widget-test.sh {{arg(name='widget', required=true)}}"

[tasks."widget-build"]
description = "Compiles a widget"
run = "./launcher/scripts/widget-build.sh {{arg(name='widget', required=true)}}"

[tasks."widget-ssr"]
description = "Rennder a SSR view for a widget"
run = "./launcher/scripts/widget-ssr.sh {{arg(name='widget', required=true)}}"

[tasks."widgets-deploy"]
description = "Build the ReactEdge deployment orchestrator"
run = "./launcher/scripts/widgets-deploy.sh"